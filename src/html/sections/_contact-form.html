<section class="contact-form-section py-120">
    <div class="container">
        <div class="row gy-5">
            <div class="col-lg-7">
                <div class="contact-form-section__card">
                    <h3>Send Us a Message</h3>
                    <p>Fill out the form and our team will get back to you within 24 hours.</p>

                    <form action="#">
                        <div class="row gy-3">
                            <div class="col-md-6">
                                <label class="form--label required">Full Name</label>
                                <input type="text" class="form-control form--control" placeholder="Enter your full name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form--label required">Email Address</label>
                                <input type="email" class="form-control form--control" placeholder="Enter your email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form--label">Phone Number</label>
                                <input type="tel" class="form-control form--control" placeholder="+1 (555) 000-0000">
                            </div>
                            <div class="col-md-6 contact-form-section__subject-col">
                                <label class="form--label required">Subject</label>
                                <select class="form-select form--select select2 contact-form-section__subject" data-placeholder="Select a subject" required>
                                    <option value=""></option>
                                    <option>General Inquiry</option>
                                    <option>Technical Support</option>
                                    <option>Sales Question</option>
                                    <option>Partnership</option>
                                    <option>Bug Report</option>
                                    <option>Feature Request</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form--label required">Message</label>
                                <textarea class="form-control form--control" rows="5" placeholder="Tell us how we can help" required></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check form--check form--check-base-two">
                                    <input class="form-check-input" type="checkbox" id="contactPolicy" required>
                                    <label class="form-check-label" for="contactPolicy">I agree to the <a href="#">Privacy Policy</a></label>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn--base-two"><i class="fas fa-paper-plane me-2"></i>Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="contact-form-section__side">
                    <div class="contact-form-section__map">
                        <iframe
                            src="https://maps.google.com/maps?q=Manhattan%2C%20New%20York&t=&z=13&ie=UTF8&iwloc=&output=embed"
                            title="ViserChat office location"
                            loading="lazy"
                            allowfullscreen
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>

                    <div class="contact-form-section__hours">
                        <h6>Business Hours</h6>
                        <ul>
                            <li><span>Monday to Friday</span><b>9:00 AM to 6:00 PM EST</b></li>
                            <li><span>Saturday</span><b>10:00 AM to 2:00 PM EST</b></li>
                            <li><span>Sunday</span><b>Closed</b></li>
                        </ul>
                    </div>

                    <div class="contact-form-section__chat-note">
                        <i class="fas fa-comments"></i>
                        <p>Prefer live chat? Click the chat widget in the bottom right corner.</p>
                    </div>

                    <ul class="contact-form-section__social">
                        <li><a href="https://www.facebook.com" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a></li>
                        <li><a href="https://www.twitter.com" aria-label="X"><i class="fab fa-twitter"></i></a></li>
                        <li><a href="https://www.linkedin.com" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a></li>
                        <li><a href="https://www.instagram.com" aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
