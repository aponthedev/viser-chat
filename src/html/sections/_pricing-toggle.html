<section class="pricing-toggle pt-120 pb-60">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="section-heading text-center">
          <h2 class="section-heading__title">
            Choose the Right <span> Plan for Your Team</span>
          </h2>
          <p class="section-heading__desc">
            Start monthly, switch anytime, and save more when billed annually.
          </p>
        </div>
      </div>
    </div>
    <div class="pricing-toggle__inner text-center">
      <div
        class="pricing-toggle__switch"
        role="group"
        aria-label="Billing period selector"
      >
        <button
          type="button"
          class="pricing-toggle__btn active"
          data-billing="monthly"
        >
          Monthly
        </button>
        <button type="button" class="pricing-toggle__btn" data-billing="annual">
          Annual
        </button>
        <span class="pricing-toggle__save">Save 20%</span>
      </div>
    </div>
  </div>
</section>
