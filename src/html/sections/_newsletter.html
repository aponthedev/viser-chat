<section class="newsletter py-120" data-aos="fade-up">
  <div class="container">
    <div class="newsletter__shell">
      <div class="row align-items-center gy-4">
        <div class="col-lg-7">
          <div class="newsletter__content">
            <i class="fas fa-paper-plane"></i>
            <h2>
              Weekly Tactics for
              <span class="title-highlight"
                >Faster Support and More Revenue</span
              >
            </h2>
            <p>
              Join 10,000+ operators getting practical customer conversation
              playbooks every week.
            </p>
          </div>
        </div>
        <div class="col-lg-5">
          <form class="newsletter__form" action="#">
            <input
              type="email"
              class="form-control form--control"
              placeholder="Enter your work email"
              required
            />
            <button type="submit" class="btn btn--base-two">Subscribe</button>
          </form>
          <span class="newsletter__note"
            ><i class="fas fa-lock"></i>No spam, unsubscribe anytime.</span
          >
        </div>
      </div>
    </div>
  </div>
</section>
